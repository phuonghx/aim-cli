site_name: AIM — AI Memory & Context Engine
site_description: >-
  AIM is a zero-dependency CLI that unifies memory, tasks, and instructions for
  AI coding assistants — Claude Code, Cursor, Windsurf, GitHub Copilot, Gemini,
  and any MCP client — from one source of truth.
site_url: https://phuonghx.github.io/aim-cli/
site_author: PhuongHX

repo_name: phuonghx/aim-cli
repo_url: https://github.com/phuonghx/aim-cli
edit_uri: edit/main/docs/

copyright: Copyright &copy; PhuongHX — MIT License

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - CLI Reference: cli-reference.md
  - AI Agent Integration: agent-integration.md
  - Web Dashboard: dashboard.md
  - Templates: templates-guide.md
  - Demo Walkthrough: demo-guide.md
  - Roadmap: ROADMAP.md
  - Decisions:
      - "ADR 0001 — Freeze time tracking & users": decisions/0001-freeze-time-tracking-and-users.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phuonghx/aim-cli
