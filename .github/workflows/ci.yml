name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check aim tests

      - name: Run tests
        run: pytest -q

      - name: Install and smoke test
        shell: bash
        run: |
          # Install the package the way a user would, then exercise the
          # console-script entry point and the bundled data so packaging
          # regressions (missing package_data, broken entry point) fail CI.
          pip install .
          aim --version
          python -c "import aim.browser_server, aim.mcp_server"
          work="$(mktemp -d)"; cd "$work"; git init -q
          python -m aim.aim_cli init
          python -m aim.aim_cli lint .aim-agents/skills
