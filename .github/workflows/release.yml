name: Build and Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python packages (Wheel & Tarball)
        run: |
          # Build from the root directory where setup.py is now located
          python -m build

      - name: Create aim.zip release archive
        run: |
          # Archive the aim source directory, batch wrappers, and ignore python cache/metadata
          zip -r aim.zip aim/ aim.bat aim.sh -x "aim/__pycache__/*" "aim/**/*.pyc" "aim/aim_cli.egg-info/*"

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: |
            aim.zip
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
